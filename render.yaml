services:
  - type: web
    name: mock-successfactors
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DATA_FILE
        value: /var/data/employees.txt
      - key: ADMIN_TOKEN
        value: change-me-to-something-secret
    disk:
      name: employee-data
      mountPath: /var/data
      sizeGB: 1
